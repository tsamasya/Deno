<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Material Estimate | Prakash Electrician</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Premium Color Palette */
            --primary: #FFD000;
            --primary-dark: #e6bb00;
            --bg-main: #f0f2f5;
            --card: #ffffff;
            --text-primary: #1a1a2e;
            --text-muted: #7a8a9a;
            --border-light: #e8eef5;
            --success: #22c55e;
            --error: #ef4444;
            --whatsapp: #25D366;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --radius-md: 12px;
            --font-display: 'Barlow Condensed', sans-serif;
            --font-body: 'Nunito', sans-serif;
            --transition: all 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-main); color: var(--text-primary); font-family: var(--font-body); -webkit-font-smoothing: antialiased; padding: 20px; }

        .container { max-width: 1100px; margin: 0 auto; background: var(--card); border-radius: var(--radius-md); box-shadow: var(--shadow-md); border: 1px solid var(--border-light); overflow: hidden; }

        /* ===== HEADER ===== */
        .header { background: #1a1a2e; color: white; padding: 30px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .brand-badge { width: 55px; height: 55px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 800; color: #000; font-family: var(--font-display); box-shadow: 0 4px 16px rgba(255, 208, 0, 0.2); }
        .brand-text h1 { font-family: var(--font-display); font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; line-height: 1.1; }
        .brand-text h1 span { color: var(--primary); }
        .brand-text .tagline { color: rgba(255, 255, 255, 0.7); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; margin-top: 2px;}
        .doc-title { text-align: right; }
        .doc-title h2 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); }
        .doc-date { color: rgba(255, 255, 255, 0.7); font-size: 0.85rem; font-weight: 600; }

        /* ===== MAIN CONTENT ===== */
        .main-content { padding: 30px 40px; }

        /* --- DASHBOARD --- */
        .summary-dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; background: rgba(255, 208, 0, 0.05); padding: 20px; border-radius: var(--radius-md); border: 1px solid rgba(255, 208, 0, 0.2); }
        .summary-card { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light); }
        .summary-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 800; margin-bottom: 5px; }
        .summary-value { font-size: 1.8rem; font-weight: 800; color: #1a1a2e; font-family: var(--font-display); line-height: 1; }

        /* --- CUSTOMER INFO --- */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; background: #f8f9fa; padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border-light); }
        .input-group label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); font-weight: 800; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; background: white; border: 1px solid var(--border-light); border-radius: 6px; color: var(--text-primary); font-family: var(--font-body); font-size: 1rem; font-weight: 700; outline: none; transition: var(--transition); }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255, 208, 0, 0.1); }

        /* --- LIST HEADER --- */
        .list-header { display: flex; gap: 10px; padding: 12px 15px; background: #1a1a2e; color: white; border-radius: 8px; margin-bottom: 10px; font-family: var(--font-display); text-transform: uppercase; letter-spacing: 1px; font-size: 0.95rem; position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow-sm); }
        .col-cat { flex: 1.5; }
        .col-name { flex: 3.5; }
        .col-spec { flex: 2; }
        .col-qty { flex: 1; text-align: center; }
        .col-unit { flex: 1.2; }
        .col-del { width: 30px; text-align: center; }

        /* --- MATERIAL ROWS --- */
        .material-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 25px; }
        .mat-row { display: flex; gap: 10px; background: white; padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border-light); align-items: center; transition: var(--transition); position: relative; z-index: 1; box-shadow: var(--shadow-sm); }
        .mat-row:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255, 208, 0, 0.15); z-index: 10; }

        .mat-input, .mat-select { width: 100%; padding: 10px; background: #f8f9fa; border: 1px solid transparent; border-radius: 6px; color: var(--text-primary); font-family: var(--font-body); font-size: 0.95rem; font-weight: 700; outline: none; transition: var(--transition); }
        .mat-input:focus, .mat-select:focus { background: white; border-color: var(--primary); }
        .mat-input::placeholder { color: #aaa; font-weight: 500; }
        .col-qty .mat-input { text-align: center; }

        /* --- CUSTOM DROPDOWN --- */
        .custom-dropdown { position: relative; width: 100%; }
        .dropdown-toggle { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); background: transparent; color: var(--text-muted); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.7rem; z-index: 2; transition: 0.2s; border-radius: 50%; }
        .dropdown-toggle:hover { color: var(--primary-dark); background: rgba(255,208,0,0.1); }
        
        .dropdown-menu { position: absolute; top: calc(100% + 5px); left: 0; width: 100%; max-height: 220px; overflow-y: auto; background: white; border: 1px solid var(--border-light); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: none; list-style: none; padding: 5px 0; z-index: 200; }
        .dropdown-menu.show { display: block; animation: dropIn 0.2s ease; }
        @keyframes dropIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-menu li { padding: 10px 15px; cursor: pointer; color: var(--text-primary); font-size: 0.95rem; border-bottom: 1px solid #f0f2f5; font-weight: 600; }
        .dropdown-menu li:last-child { border-bottom: none; }
        .dropdown-menu li:hover { background: #fff8e6; color: var(--primary-dark); padding-left: 20px; transition: 0.2s; }

        /* --- SLEEK DELETE BUTTON --- */
        .btn-del { background: transparent; color: #ccc; border: none; font-size: 1.2rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .btn-del:hover { color: var(--error); transform: scale(1.2); }

        /* --- ACTIONS --- */
        .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; padding-top: 25px; border-top: 2px solid var(--border-light); }
        .btn { padding: 14px 28px; border: none; border-radius: 50px; font-family: var(--font-display); font-size: 1.05rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-width: 180px; box-shadow: var(--shadow-sm); }
        .btn:active { transform: scale(0.97); }
        .btn-wa { background: var(--whatsapp); color: white; }
        .btn-wa:hover { background: #1ebd5c; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,211,102,0.3); }
        .btn-print { background: #1a1a2e; color: white; }
        .btn-print:hover { background: #2a2a4a; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26,26,46,0.3); }
        .btn-reset { background: white; color: var(--text-muted); border: 2px solid var(--border-light); box-shadow: none; }
        .btn-reset:hover { border-color: var(--error); color: var(--error); transform: translateY(-2px); }

        /* --- TOAST NOTIFICATIONS --- */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; max-width: 350px; pointer-events: none; }
        .toast { background: white; color: var(--text-primary); padding: 14px 20px; border-radius: 8px; box-shadow: var(--shadow-md); font-weight: 700; display: flex; align-items: center; gap: 10px; animation: slideUp 0.3s ease; border-left: 4px solid var(--success); font-size: 0.95rem; pointer-events: auto; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* =======================================================
           📱 MOBILE OPTIMIZATION (Compact Fast UI)
           ======================================================= */
        @media (max-width: 768px) {
            body { padding: 5px; background: #fff; }
            .container { padding: 15px; border-radius: 0; border: none; box-shadow: none; }
            .main-content { padding: 10px 0; }
            .header { padding: 15px; border-radius: 12px; margin-bottom: 20px; flex-direction: column; align-items: flex-start; }
            .doc-title { text-align: left; }
            .summary-dashboard { grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px 10px; }
            .summary-value { font-size: 1.4rem; }
            
            .list-header { display: none; } 
            
            .mat-row { 
                display: grid; 
                grid-template-columns: 1fr 1fr 30px; 
                gap: 8px; 
                padding: 12px; 
                border-radius: 10px; 
                background: #f8f9fa;
                border: 1px solid var(--border-light);
                margin-bottom: 5px;
            }
            
            .col-cat { grid-column: 1 / 3; padding-right: 35px; } 
            .col-name { grid-column: 1 / 4; } 
            .col-spec { grid-column: 1 / 4; } 
            .col-qty { grid-column: 1 / 2; } 
            .col-unit { grid-column: 2 / 3; } 
            .col-del { position: absolute; top: 8px; right: 8px; width: 30px; height: 30px; }
            
            .mat-input, .mat-select { padding: 10px 8px; font-size: 0.95rem; background: #fff; border: 1px solid #ddd; }
            .btn { width: 100%; padding: 14px; }
            #toast-container { right: 10px; left: 10px; max-width: none; bottom: 15px; }
        }

        /* =======================================================
           🖨️ INVOICE-GRADE PRINT CSS (Perfect 1-Line Table)
           ======================================================= */
        @media print {
            @page { margin: 15mm; size: A4 portrait; }
            body { background: #fff !important; padding: 0 !important; color: #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact;}
            .container { box-shadow: none !important; border: none !important; padding: 0 !important; max-width: 100% !important; border-radius: 0 !important; }
            
            .header { background: transparent !important; color: #000 !important; border-bottom: 2px solid #000 !important; padding: 0 0 15px 0 !important; margin-bottom: 20px !important; }
            .brand-badge { background: #000 !important; color: #fff !important; box-shadow: none !important; }
            .brand h1 { color: #000 !important; }
            .brand h1 span { color: #000 !important; }
            .brand .tagline { color: #555 !important; }
            .doc-title h2 { color: #000 !important; font-size: 1.4rem !important; }
            .doc-date { color: #333 !important; }
            
            .summary-dashboard { display: none !important; }

            .info-grid { background: #fff !important; border: 1px solid #ccc !important; padding: 15px !important; margin-bottom: 25px !important; display: flex !important; justify-content: space-between !important; border-radius: 4px !important; }
            .input-group label { color: #555 !important; font-size: 8pt !important; margin-bottom: 2px !important; }
            .input-group input { border: none !important; border-bottom: 1px dotted #ccc !important; background: transparent !important; padding: 2px 0 !important; color: #000 !important; font-weight: 700 !important; font-size: 10pt !important; }
            
            /* STRICT 1-LINE TABLE FOR PAPER */
            .list-header { 
                display: flex !important; 
                background: #f0f0f0 !important; 
                color: #000 !important; 
                border: 1px solid #000 !important;
                border-bottom: 2px solid #000 !important;
                padding: 8px 10px !important;
                font-size: 10pt !important;
                font-weight: 800 !important;
                position: static !important;
                border-radius: 0 !important;
                box-shadow: none !important;
            }
            .mat-row { 
                display: flex !important; 
                background: #fff !important; 
                border: none !important; 
                border-left: 1px solid #000 !important;
                border-right: 1px solid #000 !important;
                border-bottom: 1px solid #ccc !important; 
                padding: 4px 10px !important; 
                gap: 10px !important;
                border-radius: 0 !important;
                box-shadow: none !important;
                page-break-inside: avoid !important;
                align-items: center !important;
            }
            .mat-row:nth-child(even) { background: #fafafa !important; }
            .material-list { border-bottom: 1px solid #000 !important; margin-bottom: 15px !important; gap: 0 !important; max-height: none !important; overflow: visible !important; }
            
            /* Clean Columns */
            .col-cat, .col-del { display: none !important; } 
            .col-name { flex: 4 !important; }
            .col-spec { flex: 2.5 !important; }
            .col-qty { flex: 1 !important; text-align: center !important; }
            .col-unit { flex: 1.5 !important; }
            
            /* Inputs to Plain Text */
            .mat-input, .mat-select { background: transparent !important; border: none !important; color: #000 !important; padding: 0 !important; font-size: 10pt !important; font-weight: 700 !important; -webkit-appearance: none !important; appearance: none !important; box-shadow: none !important; }
            .mat-input::placeholder { color: transparent !important; }
            
            .actions, .dropdown-toggle, .hide-on-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="container">
        
        <header class="header">
            <div class="header-left">
                <div class="brand-badge">⚡</div>
                <div class="brand-text">
                    <h1><span>Prakash</span> Electrician</h1>
                    <div class="tagline">Material Requirement Note</div>
                </div>
            </div>
            <div class="doc-title">
                <h2>Estimate Sheet</h2>
                <div class="doc-date">Date: <span id="current-date"></span></div>
            </div>
        </header>

        <div class="main-content">
            
            <div class="summary-dashboard no-print">
                <div class="summary-card">
                    <div class="summary-label">Total Items</div>
                    <div class="summary-value" id="total-items">0</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Categories</div>
                    <div class="summary-value" id="total-cats">0</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Save Status</div>
                    <div class="summary-value" id="save-status" style="color: var(--success); font-size: 1.5rem;">✔️</div>
                </div>
            </div>

            <div class="info-grid">
                <div class="input-group">
                    <label>👤 Client / Site Name</label>
                    <input type="text" id="c-name" placeholder="Enter Name" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>📍 Site Address</label>
                    <input type="text" id="c-address" placeholder="Location" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>🔧 Work Stage</label>
                    <input type="text" id="c-stage" placeholder="e.g. Wall Cutting / Wiring" autocomplete="off">
                </div>
            </div>

            <div class="list-header">
                <div class="col-cat">Category</div>
                <div class="col-name">Material Name</div>
                <div class="col-spec">Brand / Color</div>
                <div class="col-qty">Qty</div>
                <div class="col-unit">Unit</div>
                <div class="col-del"></div>
            </div>

            <div class="material-list" id="mat-list"></div>

            <div class="actions no-print">
                <button class="btn btn-print" onclick="cleanAndPrint()">🖨️ Print Estimate</button>
                <button class="btn btn-wa" onclick="shareWhatsApp()">💬 Send WhatsApp</button>
                <button class="btn btn-reset" onclick="startNewNote()">🗑️ Start Fresh</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

        // EXPERT DATABASE (Prakash Electrician)
        const db = {
            "Linter/Slab": ["20mm Heavy Pipe", "25mm Heavy Pipe", "20mm Heavy Band", "25mm Heavy Band", "Concealed Box", "Fan Box", "3 inch Brown Tape", "Electrical Tape", "Waste Newspaper", "Steel Wire"],
            "Wall Cutting": ["20mm Light Pipe", "25mm Light Pipe", "20mm Light Band", "25mm Light Band", "Metal Box 2 Module", "Metal Box 3 Module", "Metal Box 4 Module", "Metal Box 6 Module", "Metal Box 8 Module", "Metal Box 12 Module", "Metal Box 16 Module", "Metal Box 18 Module", "Metal Junction Box", "20mm Kaju Pin", "25mm Kaju Pin", "MCB TPN Box", "5-inch Blade", "Electrical Tape"],
            "Wiring": ["0.75 sqmm Wire", "1.0 sqmm Wire", "1.5 sqmm Wire", "2.5 sqmm Wire", "4.0 sqmm Wire", "6.0 sqmm Wire", "10.0 sqmm Wire", "Telephone Wire", "Camera Wire", "Dish/Coaxial Wire", "Steel GI Wire", "20mm Flexible Pipe", "25mm Flexible Pipe", "Electrical Tape"],
            "Fittings": ["Modular Plate 2M", "Modular Plate 3M", "Modular Plate 4M", "Modular Plate 6M", "Modular Plate 8M", "Modular Plate 12M", "Modular Plate 16M", "Modular Plate 18M", "Switch 6 Amp", "Switch 16 Amp", "Socket 6 Amp", "Socket 16 Amp", "Fan Regulator", "Mini MCB 20A", "Mini MCB 25A", "Indicator", "Angle Holder", "Batten Holder", "Round Plate", "Fan Plate", "MICA Sheet", "Brass Screw", "Panel Light", "Concealed Light", "COB Light", "Profile Strip", "Cable Tie", "MCB B6", "MCB C10", "MCB C16", "MCB C20", "MCB C32", "Isolator", "RCCB"]
        };

        const listContainer = document.getElementById('mat-list');
        let globalCategory = "Linter/Slab";
        let globalUnit = "Pcs";

        // ==================== AUTO-SAVE & DASHBOARD ====================
        document.addEventListener('input', triggerAutoSave);
        document.addEventListener('change', triggerAutoSave);

        function triggerAutoSave() {
            updateDashboard();
            document.getElementById('save-status').innerText = "⏳";
            document.getElementById('save-status').style.color = "var(--primary)";
            clearTimeout(window.saveTimer);
            window.saveTimer = setTimeout(saveLocalState, 600);
        }

        function saveLocalState() {
            let state = {
                cName: document.getElementById('c-name').value,
                cAddress: document.getElementById('c-address').value,
                cStage: document.getElementById('c-stage').value,
                rows: []
            };
            document.querySelectorAll('.mat-row').forEach(row => {
                state.rows.push({
                    cat: row.querySelector('.in-cat').value,
                    name: row.querySelector('.in-name').value,
                    spec: row.querySelector('.in-spec').value,
                    qty: row.querySelector('.in-qty').value,
                    unit: row.querySelector('.in-unit').value
                });
            });
            localStorage.setItem('prakash_mat_note', JSON.stringify(state));
            document.getElementById('save-status').innerText = "✔️";
            document.getElementById('save-status').style.color = "var(--success)";
        }

        function loadLocalState() {
            let saved = localStorage.getItem('prakash_mat_note');
            if (saved) {
                let state = JSON.parse(saved);
                document.getElementById('c-name').value = state.cName || "";
                document.getElementById('c-address').value = state.cAddress || "";
                document.getElementById('c-stage').value = state.cStage || "";

                if (state.rows && state.rows.length > 0) {
                    listContainer.innerHTML = "";
                    state.rows.forEach(rData => createRow(rData));
                } else { initDefaultRows(); }
            } else { initDefaultRows(); }
            ensureBlankRow();
            updateDashboard();
        }

        window.addEventListener('DOMContentLoaded', loadLocalState);

        function initDefaultRows() { listContainer.innerHTML = ""; createRow(); createRow(); createRow(); }

        function startNewNote() {
            if (confirm("Clear entire list and start fresh? This cannot be undone.")) {
                localStorage.removeItem('prakash_mat_note');
                document.getElementById('c-name').value = "";
                document.getElementById('c-address').value = "";
                document.getElementById('c-stage').value = "";
                initDefaultRows();
                updateDashboard();
                showToast("🗑️ Form reset successfully");
            }
        }

        function updateDashboard() {
            let count = 0;
            let categories = new Set();
            document.querySelectorAll('.mat-row').forEach(row => {
                if (row.querySelector('.in-name').value.trim() !== "") {
                    count++;
                    categories.add(row.querySelector('.in-cat').value);
                }
            });
            document.getElementById('total-items').innerText = count;
            document.getElementById('total-cats').innerText = categories.size;
        }

        // ==================== FAST CREATE ROW ====================
        function createRow(data = null) {
            const row = document.createElement('div');
            row.className = 'mat-row';

            // Expert Keyboard Navigation: Enter jumps smoothly without losing focus
            const keyNavName = `onkeydown="if(event.key === 'Enter') { event.preventDefault(); closeAllDropdowns(); this.closest('.mat-row').querySelector('.in-spec').focus(); }"`;
            const keyNavSpec = `onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.closest('.mat-row').querySelector('.in-qty').focus(); }"`;
            const keyNavQty = `onkeydown="if(event.key === 'Enter') { event.preventDefault(); ensureBlankRow(); const nextRow = this.closest('.mat-row').nextElementSibling; if(nextRow) nextRow.querySelector('.in-name').focus(); }"`;

            row.innerHTML = `
                <div class="col-cat">
                    <select class="mat-select in-cat" onchange="syncCategories(this)">
                        <option value="Linter/Slab">Linter/Slab</option>
                        <option value="Wall Cutting">Wall Cutting</option>
                        <option value="Wiring">Wiring</option>
                        <option value="Fittings">Fittings</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-name custom-dropdown">
                    <input type="text" class="mat-input in-name" placeholder="Material name..." oninput="handleInput(this)" onfocus="openDropdown(this)" ${keyNavName}>
                    <div class="dropdown-toggle" onclick="toggleBtn(this)">▼</div>
                    <ul class="dropdown-menu"></ul>
                </div>
                <div class="col-spec"><input type="text" class="mat-input in-spec" placeholder="Brand / Color" ${keyNavSpec}></div>
                <div class="col-qty"><input type="number" class="mat-input in-qty" placeholder="0" min="0" ${keyNavQty}></div>
                <div class="col-unit">
                    <select class="mat-select in-unit" onchange="syncUnits(this)">
                        <option value="Pcs">Pcs</option>
                        <option value="Coil">Coil</option>
                        <option value="Box">Box</option>
                        <option value="Mtr">Mtr</option>
                        <option value="Pkt">Pkt</option>
                        <option value="Bdl">Bdl</option>
                    </select>
                </div>
                <div class="col-del"><button class="btn-del" onclick="deleteRow(this)" title="Delete Row">✕</button></div>
            `;

            if (data) {
                row.querySelector('.in-cat').value = data.cat || "Linter/Slab";
                row.querySelector('.in-name').value = data.name || "";
                row.querySelector('.in-spec').value = data.spec || "";
                row.querySelector('.in-qty').value = data.qty || "";
                row.querySelector('.in-unit').value = data.unit || "Pcs";
            } else {
                row.querySelector('.in-cat').value = globalCategory;
                row.querySelector('.in-unit').value = globalUnit;
            }

            listContainer.appendChild(row);
        }

        function ensureBlankRow() {
            const allRows = document.querySelectorAll('.mat-row');
            if (allRows.length === 0) { createRow(); return; }
            const last = allRows[allRows.length - 1];
            if (last.querySelector('.in-name').value.trim() !== "") createRow();
        }

        // ==================== SMART SYNC & GUESSER ====================
        function syncCategories(sel) {
            globalCategory = sel.value;
            const rows = Array.from(document.querySelectorAll('.mat-row'));
            for (let i = rows.indexOf(sel.closest('.mat-row')) + 1; i < rows.length; i++) {
                if (rows[i].querySelector('.in-name').value.trim() === "") rows[i].querySelector('.in-cat').value = globalCategory;
                else break;
            }
        }

        function syncUnits(sel) {
            globalUnit = sel.value;
            const rows = Array.from(document.querySelectorAll('.mat-row'));
            for (let i = rows.indexOf(sel.closest('.mat-row')) + 1; i < rows.length; i++) {
                if (rows[i].querySelector('.in-name').value.trim() === "") rows[i].querySelector('.in-unit').value = globalUnit;
                else break;
            }
        }

        function smartUnitGuesser(itemName, unitDropdown) {
            let n = itemName.toLowerCase();
            if (n.includes('wire')) { unitDropdown.value = 'Coil'; syncUnits(unitDropdown); } 
            else if (n.includes('tape') || n.includes('tie') || n.includes('screw') || n.includes('pin') || n.includes('blade')) { unitDropdown.value = 'Pkt'; syncUnits(unitDropdown); } 
            else if (n.includes('pipe') || n.includes('band')) { unitDropdown.value = 'Pcs'; syncUnits(unitDropdown); }
        }

        // ==================== DROPDOWN ENGINE ====================
        function handleInput(inp) {
            ensureBlankRow();
            const menu = inp.parentElement.querySelector('.dropdown-menu');
            if (menu.classList.contains('show')) renderDropdownList(inp);
        }

        function openDropdown(inp) {
            closeAllDropdowns();
            inp.closest('.mat-row').classList.add('active-dropdown');
            renderDropdownList(inp);
            inp.parentElement.querySelector('.dropdown-menu').classList.add('show');
        }

        function toggleBtn(btn) {
            const input = btn.parentElement.querySelector('.in-name');
            if (btn.parentElement.querySelector('.dropdown-menu').classList.contains('show')) {
                closeAllDropdowns();
            } else {
                input.value = ""; openDropdown(input); input.focus();
            }
        }

        function renderDropdownList(input) {
            const menu = input.parentElement.querySelector('.dropdown-menu');
            const rowCat = input.closest('.mat-row').querySelector('.in-cat').value;
            let items = db[rowCat] || [];
            let filterText = input.value.toLowerCase();

            // Filter out items already selected
            let usedItems = Array.from(document.querySelectorAll('.in-name')).map(i => input !== i ? i.value.trim().toLowerCase() : "").filter(v => v);

            menu.innerHTML = "";
            let count = 0;

            items.forEach(item => {
                if (item.toLowerCase().includes(filterText) && !usedItems.includes(item.toLowerCase())) {
                    let li = document.createElement('li');
                    li.innerText = item;
                    li.onmousedown = function(e) {
                        e.preventDefault();
                        input.value = item;
                        smartUnitGuesser(item, input.closest('.mat-row').querySelector('.in-unit'));
                        closeAllDropdowns();
                        handleInput(input);
                        triggerAutoSave();
                        input.closest('.mat-row').querySelector('.in-spec').focus();
                    };
                    menu.appendChild(li);
                    count++;
                }
            });

            if (count === 0) {
                let li = document.createElement('li');
                li.innerText = "➕ Type custom item...";
                li.style.color = "#999";
                li.style.fontStyle = "italic";
                menu.appendChild(li);
            }
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.mat-row').forEach(r => r.classList.remove('active-dropdown'));
        }
        document.addEventListener('mousedown', e => { if (!e.target.closest('.custom-dropdown')) closeAllDropdowns(); });

        // ==================== DELETE ROW ====================
        function deleteRow(btn) {
            const list = document.getElementById('mat-list');
            if (list.children.length > 1) {
                btn.closest('.mat-row').remove();
                showToast("🗑️ Item removed");
            } else {
                const r = btn.closest('.mat-row');
                r.querySelector('.in-name').value = "";
                r.querySelector('.in-spec').value = "";
                r.querySelector('.in-qty').value = "";
            }
            ensureBlankRow();
            triggerAutoSave();
        }

        // ==================== TOASTS ====================
        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.innerHTML = `<span>✅</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
        }

        // ==================== PRINT INVOICE ====================
        function cleanAndPrint() {
            document.querySelectorAll('.mat-row').forEach(row => {
                const name = row.querySelector('.in-name').value.trim();
                // ONLY hide if the material name is completely blank.
                // Keeps the row if Qty is 0/blank so shopkeepers can fill it!
                if (name === "") {
                    row.classList.add('hide-on-print');
                } else {
                    row.classList.remove('hide-on-print');
                }
            });
            showToast('🖨️ Opening print layout...');
            setTimeout(() => window.print(), 300);
        }

        // ==================== WHATSAPP SHARE ====================
        function shareWhatsApp() {
            const cName = document.getElementById('c-name').value || "Customer";
            const cAddress = document.getElementById('c-address').value;
            
            let msg = `*📋 MATERIAL ESTIMATE*\n*Customer:* ${cName}\n`;
            if(cAddress) msg += `*Location:* ${cAddress}\n`;
            msg += `*Date:* ${new Date().toLocaleDateString('en-IN')}\n════════════════════════\n`;

            let categories = {};
            let actualCount = 0;

            document.querySelectorAll('.mat-row').forEach(row => {
                const cat = row.querySelector('.in-cat').value;
                const name = row.querySelector('.in-name').value.trim();
                const spec = row.querySelector('.in-spec').value.trim();
                const qty = parseFloat(row.querySelector('.in-qty').value);
                const unit = row.querySelector('.in-unit').value;

                if (name !== "") {
                    actualCount++;
                    if (!categories[cat]) categories[cat] = [];
                    // Handle blank/0 quantities gracefully
                    let qtyText = (!isNaN(qty) && qty > 0) ? ` → *${qty} ${unit}*` : "";
                    categories[cat].push(`▪ ${name}${spec ? ` (${spec})` : ''}${qtyText}`);
                }
            });

            for (const [catName, items] of Object.entries(categories)) {
                msg += `\n*${catName.toUpperCase()}*\n` + items.join("\n") + "\n";
            }

            msg += `════════════════════════\n*Total Items:* ${actualCount}\n*Generated by Prakash Electrician*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            showToast('💬 Opening WhatsApp...');
        }
    </script>
</body>
