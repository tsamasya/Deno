<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Material Note | Prakash Electrician</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --accent: #FFD000;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #2a2a2a;
            --red: #ff4444;
            --wa: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; -webkit-font-smoothing: antialiased; padding: 15px; }

        .container { max-width: 1000px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }

        /* --- Header --- */
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start; border-bottom: 2px dashed var(--border); padding-bottom: 20px; margin-bottom: 20px; gap: 15px; }
        .brand h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; color: var(--text); text-transform: uppercase; letter-spacing: 1px; line-height: 1; }
        .brand h1 span { color: var(--accent); }
        .tagline { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 5px; }
        .doc-title { text-align: right; }
        .doc-title h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .date-box { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; }

        /* --- Customer Details --- */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; background: transparent; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        .input-group input { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 600; outline: none; transition: 0.2s; }
        .input-group input:focus { border-color: var(--accent); background: rgba(255,208,0,0.05); }

        /* --- Desktop List Header --- */
        .list-header { position: sticky; top: 0; z-index: 50; display: flex; gap: 10px; padding: 12px 15px; background: #1a1a1a; border-radius: 6px; margin-bottom: 10px; font-family: 'Barlow Condensed', sans-serif; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-size: 1.1rem; border: 1px solid var(--border); }
        
        .col-cat { flex: 1.5; }
        .col-name { flex: 3.5; }
        .col-spec { flex: 2; }
        .col-qty { flex: 1; text-align: center; }
        .col-unit { flex: 1.2; }
        .col-del { width: 30px; }

        /* --- The Dynamic Row --- */
        .material-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .mat-row { display: flex; gap: 10px; background: #0a0a0a; padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border); align-items: center; position: relative; z-index: 1; }
        
        .mat-row.is-duplicate { border-color: var(--red); background: rgba(255, 68, 68, 0.05); }

        .mat-input, .mat-select { width: 100%; padding: 10px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 600; outline: none; transition: 0.2s; }
        .mat-input:focus, .mat-select:focus { border-color: var(--accent); background: #151515; }
        .mat-input::placeholder { color: #444; font-weight: 400; }

        /* --- Slinky 'X' Delete Button (Matches your UI requirement) --- */
        .btn-del { width: 30px; height: 30px; background: transparent; color: #555; border: none; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-del:hover { color: var(--red); transform: scale(1.2); }

        /* --- Custom Dropdown --- */
        .custom-dropdown { position: relative; width: 100%; }
        .dropdown-toggle { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); background: transparent; color: var(--text-muted); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.7rem; z-index: 2; transition: 0.2s; }
        .dropdown-toggle:hover { color: var(--accent); }
        
        .dropdown-menu { position: absolute; top: calc(100% + 5px); left: 0; width: 100%; max-height: 250px; overflow-y: auto; background: #1a1a1a; border: 1px solid var(--accent); border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); display: none; list-style: none; padding: 5px 0; }
        .mat-row.active-dropdown { z-index: 100; border-color: #555; }
        .dropdown-menu.show { display: block; }
        
        .dropdown-menu li { padding: 12px 15px; cursor: pointer; color: #eee; font-size: 0.95rem; border-bottom: 1px solid #252525; }
        .dropdown-menu li:last-child { border-bottom: none; }
        .dropdown-menu li:hover { background: rgba(255,208,0,0.15); color: var(--accent); font-weight: 700; }

        /* --- UI Controls --- */
        .controls-bar { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 15px; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .ai-voice-btn { background: rgba(37, 211, 102, 0.1); border: 1px solid var(--wa); color: var(--wa); padding: 10px 20px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-weight: 800; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.3s; }
        .ai-voice-btn:hover { background: var(--wa); color: #000; }
        .ai-voice-btn.listening { background: var(--red); border-color: var(--red); color: #fff; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .btn { padding: 12px 24px; border: none; border-radius: 50px; font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; flex: 1; min-width: 160px; }
        .btn-wa { background: var(--wa); color: #000; }
        .btn-print { background: #fff; color: #000; }
        .btn-reset { background: transparent; border: 1px solid #555; color: #888; }
        .btn-reset:hover { color: var(--red); border-color: var(--red); }

        /* =======================================================
           📱 MOBILE OPTIMIZATION
           ======================================================= */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 15px; border-radius: 8px; border-top: 3px solid var(--accent); }
            .list-header { display: none; } /* Hide desktop header */
            
            .mat-row { 
                display: grid; 
                grid-template-columns: 1fr 1fr; 
                gap: 10px; 
                padding: 15px 12px; 
                border-radius: 8px; 
                background: #0c0c0c;
                margin-bottom: 5px;
            }
            
            /* The 'X' Button matched to your drawing */
            .col-del { position: absolute; top: 0px; right: 0px; width: 35px; height: 35px; }
            .btn-del { width: 100%; height: 100%; font-size: 1.1rem; color: #555; }
            
            .col-cat { grid-column: 1 / 3; padding-right: 25px; } /* Leave room for X */
            .col-name { grid-column: 1 / 3; } 
            .col-spec { grid-column: 1 / 3; } 
            .col-qty { grid-column: 1 / 2; } 
            .col-unit { grid-column: 2 / 3; } 
            
            .mat-input, .mat-select { padding: 12px 10px; font-size: 1rem; border-color: #222; }
            .controls-bar { flex-direction: column; align-items: stretch; }
            .ai-voice-btn { justify-content: center; padding: 15px; font-size: 1.1rem; }
        }

        /* =======================================================
           🖨️ INVOICE-GRADE PRINT CSS (Perfect single-line format)
           ======================================================= */
        @media print {
            @page { margin: 10mm; size: A4 portrait; }
            body { background: #fff !important; padding: 0 !important; color: #000 !important; -webkit-print-color-adjust: exact; }
            .container { box-shadow: none !important; border: none !important; padding: 0 !important; max-width: 100% !important; }
            
            .brand h1, .doc-title h2, .brand h1 span { color: #000 !important; }
            .tagline { color: #555 !important; }
            .info-grid { background: #fff !important; border: 1px solid #ccc !important; padding: 10px !important; margin-bottom: 20px !important; display: flex !important; justify-content: space-between !important; border-radius: 4px !important; }
            .input-group label { color: #666 !important; font-size: 8pt !important; }
            .input-group input { border: none !important; background: transparent !important; padding: 0 !important; color: #000 !important; font-weight: bold !important; font-size: 11pt !important; }
            
            /* FORCE STRICT 1-LINE TABLE ON PAPER */
            .list-header { 
                display: flex !important; 
                background: #f4f4f4 !important; 
                color: #000 !important; 
                border: 1px solid #000 !important;
                border-bottom: 2px solid #000 !important;
                padding: 8px 10px !important;
                font-size: 10pt !important;
                font-weight: bold !important;
                position: static !important;
            }
            .mat-row { 
                display: flex !important; 
                background: #fff !important; 
                border: none !important; 
                border-left: 1px solid #000 !important;
                border-right: 1px solid #000 !important;
                border-bottom: 1px solid #ccc !important; 
                padding: 4px 10px !important; 
                gap: 10px !important;
                border-radius: 0 !important;
                box-shadow: none !important;
                page-break-inside: avoid !important;
            }
            .material-list { border-bottom: 1px solid #000 !important; margin-bottom: 10px !important; gap: 0 !important; }
            
            /* Strict Column Widths for Print */
            .col-cat, .col-del { display: none !important; } /* Hide Category and Delete X */
            .col-name { width: 50% !important; flex: none !important; }
            .col-spec { width: 25% !important; flex: none !important; }
            .col-qty { width: 10% !important; flex: none !important; text-align: center !important; }
            .col-unit { width: 15% !important; flex: none !important; }
            
            /* Inputs to Plain Text */
            .mat-input, .mat-select { background: transparent !important; border: none !important; color: #000 !important; padding: 0 !important; font-size: 10pt !important; font-weight: bold !important; -webkit-appearance: none !important; appearance: none !important; }
            .mat-input::placeholder { color: transparent !important; }
            
            /* Hide web buttons */
            .controls-bar, .actions, .dropdown-toggle, .hide-on-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <div class="brand">
                <h1>Prakash <span>Electrician</span></h1>
                <p class="tagline">Official Material Requirement Note</p>
            </div>
            <div class="doc-title">
                <h2>Material List</h2>
                <div class="date-box">Date: <span id="current-date"></span></div>
            </div>
        </div>

        <div class="info-grid">
            <div class="input-group">
                <label>Client Name</label>
                <input type="text" id="c-name" placeholder="Enter Name">
            </div>
            <div class="input-group">
                <label>Site Address</label>
                <input type="text" id="c-address" placeholder="Location">
            </div>
            <div class="input-group">
                <label>Work Stage</label>
                <input type="text" id="c-stage" placeholder="e.g. Wall Cutting">
            </div>
        </div>

        <!-- AI Voice & Count Bar -->
        <div class="controls-bar no-print">
            <button class="ai-voice-btn" id="voice-btn" onclick="startVoiceAI()">
                🎙️ AI Voice Add (Speak Items)
            </button>
            <div style="color: var(--text-muted); font-size: 0.9rem;">
                Items: <span id="total-items-count" style="color: #fff; font-weight: bold;">0</span> | <span id="save-status" style="color: var(--accent);">✔️ Saved</span>
            </div>
        </div>

        <div class="list-header">
            <div class="col-cat">Category</div>
            <div class="col-name">Material Name</div>
            <div class="col-spec">Brand / Color</div>
            <div class="col-qty">Qty</div>
            <div class="col-unit">Unit</div>
            <div class="col-del"></div>
        </div>

        <div class="material-list" id="mat-list">
            <!-- Rows injected by JS -->
        </div>

        <div class="actions no-print">
            <button class="btn btn-print" onclick="cleanAndPrint()">🖨️ Print / Save PDF</button>
            <button class="btn btn-wa" onclick="shareWhatsApp()">📱 WhatsApp List</button>
            <button class="btn btn-reset" onclick="startNewNote()">🗑️ Start New</button>
        </div>

    </div>

    <script>
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-IN');

        // EXPERT DATABASE
        const db = {
            "Linter/Slab": ["20mm Heavy Pipe", "25mm Heavy Pipe", "20mm Heavy Band", "25mm Heavy Band", "Concealed Box", "Fan Box", "3 inch Brown Tape", "Electrical Tape", "Waste Newspaper", "Steel Wire"],
            "Wall Cutting": ["20mm Light Pipe", "25mm Light Pipe", "20mm Light Band", "25mm Light Band", "Metal Box 2 Module", "Metal Box 3 Module", "Metal Box 4 Module", "Metal Box 6 Module", "Metal Box 8 Module", "Metal Box 12 Module", "Metal Box 16 Module", "Metal Box 18 Module", "Metal Junction Box", "20mm Kaju Pin", "25mm Kaju Pin", "MCB TPN Box", "5-inch Blade", "Electrical Tape"],
            "Wiring": ["0.75 sqmm Wire", "1.0 sqmm Wire", "1.5 sqmm Wire", "2.5 sqmm Wire", "4.0 sqmm Wire", "6.0 sqmm Wire", "10.0 sqmm Wire", "Telephone Wire", "Camera Wire", "Dish/Coaxial Wire", "Steel GI Wire", "20mm Flexible Pipe", "25mm Flexible Pipe", "Electrical Tape"],
            "Fittings": ["Modular Plate 2M", "Modular Plate 3M", "Modular Plate 4M", "Modular Plate 6M", "Modular Plate 8M", "Modular Plate 12M", "Modular Plate 16M", "Modular Plate 18M", "Switch 6 Amp", "Switch 16 Amp", "Socket 6 Amp", "Socket 16 Amp", "Fan Regulator", "Mini MCB 20A", "Mini MCB 25A", "Indicator", "Angle Holder", "Batten Holder", "Round Plate", "Fan Plate", "MICA Sheet", "Brass Screw", "Panel Light", "Concealed Light", "COB Light", "Profile Strip", "Cable Tie", "MCB B6", "MCB C10", "MCB C16", "MCB C20", "MCB C32", "Isolator", "RCCB"]
        };

        const listContainer = document.getElementById('mat-list');
        let globalCategory = "Linter/Slab"; 
        let globalUnit = "Pcs";

        // 🟢 AUTO-SAVE ENGINE
        document.addEventListener('input', triggerAutoSave);
        document.addEventListener('change', triggerAutoSave);

        function triggerAutoSave() {
            countItems();
            document.getElementById('save-status').innerText = "⏳ Saving...";
            clearTimeout(window.saveTimer);
            window.saveTimer = setTimeout(saveLocalState, 500); 
        }

        function saveLocalState() {
            let state = {
                cName: document.getElementById('c-name').value,
                cAddress: document.getElementById('c-address').value,
                cStage: document.getElementById('c-stage').value,
                rows: []
            };
            document.querySelectorAll('.mat-row').forEach(row => {
                state.rows.push({
                    cat: row.querySelector('.in-cat').value,
                    name: row.querySelector('.in-name').value,
                    spec: row.querySelector('.in-spec').value,
                    qty: row.querySelector('.in-qty').value,
                    unit: row.querySelector('.in-unit').value
                });
            });
            localStorage.setItem('prakash_mat_note', JSON.stringify(state));
            document.getElementById('save-status').innerText = "✔️ Saved";
        }

        function loadLocalState() {
            let saved = localStorage.getItem('prakash_mat_note');
            if (saved) {
                let state = JSON.parse(saved);
                document.getElementById('c-name').value = state.cName || "";
                document.getElementById('c-address').value = state.cAddress || "";
                document.getElementById('c-stage').value = state.cStage || "";

                if (state.rows && state.rows.length > 0) {
                    listContainer.innerHTML = ""; 
                    state.rows.forEach(rData => createRow(rData));
                } else { initDefaultRows(); }
            } else { initDefaultRows(); }
            ensureBlankRow();
            countItems();
        }

        window.addEventListener('DOMContentLoaded', loadLocalState);

        function initDefaultRows() { listContainer.innerHTML = ""; createRow(); }

        function startNewNote() {
            if(confirm("Clear entire list and start fresh?")) {
                localStorage.removeItem('prakash_mat_note');
                document.getElementById('c-name').value = ""; document.getElementById('c-address').value = ""; document.getElementById('c-stage').value = "";
                initDefaultRows(); countItems();
            }
        }

        function countItems() {
            let count = 0;
            document.querySelectorAll('.mat-row').forEach(row => { if(row.querySelector('.in-name').value.trim() !== "") count++; });
            document.getElementById('total-items-count').innerText = count;
        }

        // 1. CREATE A NEW ROW (Fast Entry)
        function createRow(data = null) {
            const row = document.createElement('div');
            row.className = 'mat-row';
            
            // Fast Keyboard Nav: Press Enter to jump to the next logical input
            row.innerHTML = `
                <div class="col-cat">
                    <select class="mat-select in-cat" onchange="syncCategories(this)">
                        <option value="Linter/Slab">Linter/Slab</option>
                        <option value="Wall Cutting">Wall Cutting</option>
                        <option value="Wiring">Wiring</option>
                        <option value="Fittings">Fittings</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-name custom-dropdown">
                    <input type="text" class="mat-input in-name" placeholder="Material..." oninput="handleInput(this)" onfocus="openDropdown(this)" onkeydown="if(event.key==='Enter'){event.preventDefault(); this.closest('.mat-row').querySelector('.in-spec').focus();}">
                    <div class="dropdown-toggle" onclick="toggleBtn(this)">▼</div>
                    <ul class="dropdown-menu"></ul>
                </div>
                <div class="col-spec"><input type="text" class="mat-input in-spec" placeholder="Brand/Color" onkeydown="if(event.key==='Enter'){event.preventDefault(); this.closest('.mat-row').querySelector('.in-qty').focus();}"></div>
                <div class="col-qty"><input type="number" class="mat-input in-qty" placeholder="Qty" min="0" onkeydown="if(event.key==='Enter'){event.preventDefault(); ensureBlankRow(); const nextRow = this.closest('.mat-row').nextElementSibling; if(nextRow) nextRow.querySelector('.in-name').focus();}"></div>
                <div class="col-unit">
                    <select class="mat-select in-unit" onchange="syncUnits(this)">
                        <option value="Pcs">Pcs</option>
                        <option value="Coil">Coil</option>
                        <option value="Box">Box</option>
                        <option value="Mtr">Mtr</option>
                        <option value="Pkt">Pkt</option>
                        <option value="Bdl">Bdl</option>
                    </select>
                </div>
                <div class="col-del"><button class="btn-del" onclick="deleteRow(this)" title="Remove Item">✕</button></div>
            `;
            
            if (data) {
                row.querySelector('.in-cat').value = data.cat || "Linter/Slab";
                row.querySelector('.in-name').value = data.name || "";
                row.querySelector('.in-spec').value = data.spec || "";
                row.querySelector('.in-qty').value = data.qty || "";
                row.querySelector('.in-unit').value = data.unit || "Pcs";
            } else {
                row.querySelector('.in-cat').value = globalCategory;
                row.querySelector('.in-unit').value = globalUnit;
            }

            listContainer.appendChild(row);
        }

        function ensureBlankRow() {
            const allRows = document.querySelectorAll('.mat-row');
            if(allRows.length === 0) { createRow(); return; }
            if(allRows[allRows.length - 1].querySelector('.in-name').value.trim() !== "") createRow();
        }

        // 2. SMART SYNC (CATEGORY & UNIT)
        function syncCategories(sel) {
            globalCategory = sel.value; 
            const rows = Array.from(document.querySelectorAll('.mat-row'));
            for(let i = rows.indexOf(sel.closest('.mat-row')) + 1; i < rows.length; i++) {
                if(rows[i].querySelector('.in-name').value.trim() === "") rows[i].querySelector('.in-cat').value = globalCategory; else break;
            }
        }

        function syncUnits(sel) {
            globalUnit = sel.value; 
            const rows = Array.from(document.querySelectorAll('.mat-row'));
            for(let i = rows.indexOf(sel.closest('.mat-row')) + 1; i < rows.length; i++) {
                if(rows[i].querySelector('.in-name').value.trim() === "") rows[i].querySelector('.in-unit').value = globalUnit; else break;
            }
        }

        function smartUnitGuesser(itemName, unitDropdown) {
            let n = itemName.toLowerCase();
            if(n.includes('wire')) { unitDropdown.value = 'Coil'; syncUnits(unitDropdown); }
            else if(n.includes('tape') || n.includes('tie') || n.includes('screw') || n.includes('pin')) { unitDropdown.value = 'Pkt'; syncUnits(unitDropdown); }
            else if(n.includes('pipe') || n.includes('band')) { unitDropdown.value = 'Pcs'; syncUnits(unitDropdown); }
        }

        // 3. AUTO-ADD ROW & DROPDOWN FILTER
        function handleInput(inp) {
            ensureBlankRow();
            const menu = inp.parentElement.querySelector('.dropdown-menu');
            if(menu.classList.contains('show')) renderDropdownList(inp);
        }

        function openDropdown(inp) {
            closeAllDropdowns();
            inp.closest('.mat-row').classList.add('active-dropdown');
            renderDropdownList(inp);
            inp.parentElement.querySelector('.dropdown-menu').classList.add('show');
        }

        function toggleBtn(btn) {
            const input = btn.parentElement.querySelector('.in-name');
            if(btn.parentElement.querySelector('.dropdown-menu').classList.contains('show')) closeAllDropdowns();
            else { input.value = ""; openDropdown(input); input.focus(); }
        }

        function renderDropdownList(input) {
            const menu = input.parentElement.querySelector('.dropdown-menu');
            const rowCat = input.closest('.mat-row').querySelector('.in-cat').value;
            let items = db[rowCat] || [];
            let filterText = input.value.toLowerCase();
            
            // REMOVE ITEMS ALREADY IN THE LIST
            let usedItems = Array.from(document.querySelectorAll('.in-name')).map(i => input !== i ? i.value.trim().toLowerCase() : "").filter(v => v !== "");
            
            menu.innerHTML = "";
            let matchCount = 0;

            items.forEach(item => {
                if(item.toLowerCase().includes(filterText) && !usedItems.includes(item.toLowerCase())) {
                    let li = document.createElement('li');
                    li.innerText = item;
                    li.onmousedown = function(e) { 
                        e.preventDefault(); 
                        input.value = item;
                        smartUnitGuesser(item, input.closest('.mat-row').querySelector('.in-unit'));
                        closeAllDropdowns();
                        handleInput(input);
                        triggerAutoSave();
                        input.closest('.mat-row').querySelector('.in-spec').focus();
                    };
                    menu.appendChild(li); matchCount++;
                }
            });
            if(matchCount === 0) { let li = document.createElement('li'); li.innerText = "Keep typing..."; li.style.color = "#888"; menu.appendChild(li); }
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.mat-row').forEach(r => r.classList.remove('active-dropdown'));
        }
        document.addEventListener('mousedown', function(e) { if(!e.target.closest('.custom-dropdown')) closeAllDropdowns(); });

        // 4. DELETE ROW
        function deleteRow(btn) {
            if(document.querySelectorAll('.mat-row').length > 1) btn.closest('.mat-row').remove();
            else { const r = btn.closest('.mat-row'); r.querySelector('.in-name').value = ""; r.querySelector('.in-spec').value = ""; r.querySelector('.in-qty').value = ""; }
            ensureBlankRow(); triggerAutoSave();
        }

        // 5. PRINT INVOICE MODE
        function cleanAndPrint() {
            document.querySelectorAll('.mat-row').forEach(row => {
                if(row.querySelector('.in-name').value.trim() === "" || !parseFloat(row.querySelector('.in-qty').value)) row.classList.add('hide-on-print');
                else row.classList.remove('hide-on-print');
            });
            window.print();
        }

        // 6. WHATSAPP EXPORT
        function shareWhatsApp() {
            let cName = document.getElementById('c-name').value || "Customer";
            let msg = `*MATERIAL REQUIREMENT NOTE*\n*Site:* ${cName}\n----------------------\n`;
            let categories = {};
            document.querySelectorAll('.mat-row').forEach(row => {
                let cat = row.querySelector('.in-cat').value; let name = row.querySelector('.in-name').value.trim(); let spec = row.querySelector('.in-spec').value.trim(); let qty = parseFloat(row.querySelector('.in-qty').value) || 0; let unit = row.querySelector('.in-unit').value;
                if(name !== "" && qty > 0) {
                    if(!categories[cat]) categories[cat] = [];
                    categories[cat].push(`▪ ${name}${spec !== "" ? ` (${spec})` : ""} - *${qty} ${unit}*`);
                }
            });
            for (const [catName, items] of Object.entries(categories)) { msg += `\n*${catName.toUpperCase()}*\n` + items.join("\n") + "\n"; }
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // 🎙️ 7. AI VOICE INPUT ENGINE (THE MAGIC FEATURE)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-IN'; // Works great for English and Hinglish
            
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                processVoiceInput(transcript);
            };
            
            recognition.onerror = function() {
                document.getElementById('voice-btn').classList.remove('listening');
                document.getElementById('voice-btn').innerHTML = "🎙️ AI Voice Add";
                alert("Voice recognition failed. Please try again.");
            }
        }

        function startVoiceAI() {
            if(recognition) {
                const btn = document.getElementById('voice-btn');
                btn.classList.add('listening');
                btn.innerHTML = "🔴 Listening... Speak now";
                recognition.start();
            } else {
                alert("Voice AI is not supported on this browser. Try Google Chrome.");
            }
        }

        function processVoiceInput(text) {
            const btn = document.getElementById('voice-btn');
            btn.classList.remove('listening');
            btn.innerHTML = "🎙️ AI Voice Add";
            
            // Split the spoken sentence by common separators ("and", "aur", commas)
            let items = text.split(/(?: and | aur | or |,)/i);
            
            let addedCount = 0;

            items.forEach(itemText => {
                // Find quantity (first number in the string)
                let qtyMatch = itemText.match(/\d+/);
                let qty = qtyMatch ? qtyMatch[0] : 1;
                
                // Find unit based on common words
                let unit = "Pcs";
                let tLower = itemText.toLowerCase();
                if(/bundle|bandal/i.test(tLower)) unit = "Bdl";
                if(/coil|wire/i.test(tLower)) unit = "Coil";
                if(/packet|pkt|box/i.test(tLower)) unit = "Pkt";
                if(/meter|mtr/i.test(tLower)) unit = "Mtr";
                
                // Extract name (remove the number and unit words)
                let name = itemText.replace(/\d+/g, '')
                                   .replace(/bundle|bandal|coil|packet|pkt|meter|mtr|pics|pcs|piece|pieces/gi, '')
                                   .trim();
                
                // Capitalize first letter of name
                if(name.length > 0) {
                    name = name.charAt(0).toUpperCase() + name.slice(1);
                    createRow({ name: name, qty: qty, unit: unit, cat: globalCategory });
                    addedCount++;
                }
            });

            if(addedCount > 0) {
                // Remove blank rows at the top
                const rows = document.querySelectorAll('.mat-row');
                rows.forEach(r => { if(r.querySelector('.in-name').value === "") r.remove(); });
                ensureBlankRow();
                triggerAutoSave();
            }
        }
    </script>
</body>
</html>
