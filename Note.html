<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Material Note | Prakash Electrician</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --accent: #FFD000;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #2a2a2a;
            --red: #ff4444;
            --wa: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; -webkit-font-smoothing: antialiased; padding: 15px; }

        .container { max-width: 1000px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        /* --- Header --- */
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start; border-bottom: 2px dashed var(--border); padding-bottom: 20px; margin-bottom: 25px; gap: 15px; }
        .brand h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; color: var(--text); text-transform: uppercase; letter-spacing: 1px; line-height: 1; }
        .brand h1 span { color: var(--accent); }
        .tagline { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 5px; }
        .doc-title { text-align: right; }
        .doc-title h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .date-box { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; }

        /* --- Customer Details --- */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 25px; background: #0a0a0a; padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        .input-group label { display: block; font-size: 0.75rem; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        .input-group input { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-family: 'Nunito', sans-serif; font-size: 1rem; outline: none; transition: 0.2s; }
        .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255,208,0,0.1); }

        /* --- Desktop List Header (Sticky for 100+ items) --- */
        .list-header { position: sticky; top: 0; z-index: 50; display: grid; grid-template-columns: 2fr 3.5fr 2fr 1fr 1.5fr 40px; gap: 10px; padding: 12px 15px; background: #1a1a1a; border-radius: 6px; margin-bottom: 10px; font-family: 'Barlow Condensed', sans-serif; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.8); border: 1px solid var(--border); }
        
        /* --- The Dynamic Row --- */
        .material-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .mat-row { display: grid; grid-template-columns: 2fr 3.5fr 2fr 1fr 1.5fr 40px; gap: 10px; background: #0a0a0a; padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border); align-items: center; transition: 0.3s; position: relative; z-index: 1; }
        
        .mat-row.is-duplicate { border-color: var(--red); box-shadow: 0 0 15px rgba(255, 68, 68, 0.2); background: rgba(255, 68, 68, 0.05); }

        .mat-input, .mat-select { width: 100%; padding: 10px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 600; outline: none; transition: 0.2s; }
        .mat-input:focus, .mat-select:focus { border-color: var(--accent); background: #151515; }
        .mat-input::placeholder { color: #555; font-weight: 400; }

        .btn-del { background: none; border: none; color: #555; font-size: 1.5rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-del:hover { color: var(--red); transform: scale(1.1); }

        /* --- Custom Dropdown --- */
        .custom-dropdown { position: relative; width: 100%; }
        .dropdown-toggle { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); background: #1a1a1a; border: 1px solid var(--border); color: var(--text-muted); width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.7rem; z-index: 2; transition: 0.2s; }
        .dropdown-toggle:hover { color: var(--accent); border-color: var(--accent); }
        
        .dropdown-menu { position: absolute; top: calc(100% + 5px); left: 0; width: 100%; max-height: 250px; overflow-y: auto; background: #1a1a1a; border: 1px solid var(--accent); border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); display: none; list-style: none; padding: 5px 0; }
        .mat-row.active-dropdown { z-index: 100; box-shadow: 0 0 20px rgba(255,208,0,0.1); border-color: #444; }
        .dropdown-menu.show { display: block; animation: dropIn 0.2s ease; }
        
        .dropdown-menu li { padding: 12px 15px; cursor: pointer; color: #eee; font-size: 0.95rem; border-bottom: 1px solid #252525; }
        .dropdown-menu li:last-child { border-bottom: none; }
        .dropdown-menu li:hover { background: rgba(255,208,0,0.15); color: var(--accent); font-weight: 700; }
        
        @keyframes dropIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Footer Info & Buttons --- */
        .stats-bar { color: var(--accent); font-weight: 800; font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid var(--border); padding-top: 15px; margin-bottom: 20px; display: flex; justify-content: space-between;}
        
        .actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .btn { padding: 14px 24px; border: none; border-radius: 50px; font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; flex: 1; min-width: 180px; }
        .btn-wa { background: var(--wa); color: #fff; box-shadow: 0 4px 15px rgba(37,211,102,0.2); }
        .btn-wa:hover { background: #1ebd5c; transform: translateY(-2px); }
        .btn-print { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn-print:hover { background: var(--accent); color: #000; }
        .btn-reset { background: rgba(255,68,68,0.1); border: 1px solid var(--red); color: var(--red); }
        .btn-reset:hover { background: var(--red); color: #fff; }

        /* =======================================================
           📱 MOBILE OPTIMIZATION (COMPACT CHUNKY CARDS)
           ======================================================= */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 15px; border-radius: 8px; }
            .doc-title { text-align: left; }
            .list-header { display: none; }
            
            .mat-row { 
                display: grid; 
                grid-template-columns: 1fr 1fr; 
                gap: 10px; 
                padding: 15px; 
                border-radius: 10px; 
                background: #0f0f0f;
            }
            
            .mat-row > div:nth-child(1) { grid-column: 1 / 3; } /* Category */
            .mat-row > div:nth-child(2) { grid-column: 1 / 3; } /* Item Name */
            .mat-row > div:nth-child(3) { grid-column: 1 / 3; } /* Color/Brand */
            .mat-row > div:nth-child(4) { grid-column: 1 / 2; } /* Qty */
            .mat-row > div:nth-child(5) { grid-column: 2 / 3; } /* Unit */
            
            .btn-del { grid-column: 1 / 3; background: rgba(255,255,255,0.05); color: #888; border-radius: 6px; padding: 10px; font-size: 1rem; border: 1px solid var(--border); }
            .btn-del::after { content: ' Remove Line'; font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 700; margin-left: 5px; text-transform: uppercase;}
            .btn-del:hover { background: rgba(255,68,68,0.1); color: var(--red); border-color: var(--red); }
        }

        /* =======================================================
           🖨️ MAGIC PRINT CSS (Forces 1-Line Table Layout Even on Mobile)
           ======================================================= */
        @media print {
            @page { margin: 1cm; }
            body { background: #fff !important; padding: 0 !important; color: #000 !important; }
            .container { box-shadow: none !important; border: none !important; padding: 0 !important; max-width: 100% !important; border-radius: 0 !important; }
            .brand h1, .doc-title h2, .brand h1 span { color: #000 !important; }
            .info-grid { background: #fff !important; border: 1px solid #000 !important; padding: 15px !important; margin-bottom: 20px !important; }
            .input-group label { color: #333 !important; }
            .input-group input { border: none !important; background: transparent !important; padding: 0 !important; color: #000 !important; font-weight: 700 !important; }
            
            /* FORCE GRID LAYOUT ON MOBILE DURING PRINT */
            .list-header { 
                display: grid !important; 
                grid-template-columns: 4fr 2.5fr 1fr 1fr !important; /* ONLY 4 COLUMNS FOR PRINT */
                background: #f0f0f0 !important; 
                color: #000 !important; 
                border: 1px solid #000 !important;
                border-bottom: 2px solid #000 !important;
                padding: 10px !important;
                position: static !important;
            }
            .mat-row { 
                display: grid !important; 
                grid-template-columns: 4fr 2.5fr 1fr 1fr !important; /* ONLY 4 COLUMNS FOR PRINT */
                background: #fff !important; 
                border: none !important; 
                border-left: 1px solid #000 !important;
                border-right: 1px solid #000 !important;
                border-bottom: 1px solid #ccc !important; 
                padding: 5px 10px !important; 
                gap: 10px !important;
                page-break-inside: avoid !important;
            }
            
            /* HIDE CATEGORY (1st child) AND DELETE BTN (last child) */
            .list-header > div:nth-child(1), .list-header > div:nth-child(6) { display: none !important; }
            .mat-row > div:nth-child(1), .mat-row > div:nth-child(6) { display: none !important; }
            
            /* Clean Inputs for Paper */
            .mat-input, .mat-select { background: transparent !important; border: none !important; color: #000 !important; padding: 0 !important; -webkit-appearance: none !important; appearance: none !important; font-size: 11pt !important; font-weight: 700 !important;}
            
            /* Hide UI Elements */
            .actions, .dropdown-toggle, .stats-bar { display: none !important; }
            .hide-on-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <div class="brand">
                <h1>Prakash <span>Electrician</span></h1>
                <p class="tagline">Official Material Requirement Note</p>
            </div>
            <div class="doc-title">
                <h2>Material List</h2>
                <div class="date-box">Date: <span id="current-date"></span></div>
            </div>
        </div>

        <div class="info-grid">
            <div class="input-group">
                <label>Client Name</label>
                <input type="text" id="c-name" placeholder="Enter Name">
            </div>
            <div class="input-group">
                <label>Site Address</label>
                <input type="text" id="c-address" placeholder="Location">
            </div>
            <div class="input-group">
                <label>Work Stage</label>
                <input type="text" id="c-stage" placeholder="e.g. Wall Cutting, Wiring">
            </div>
        </div>

        <div class="list-header">
            <div>Category</div>
            <div>Material Name</div>
            <div>Brand / Color</div>
            <div>Qty</div>
            <div>Unit</div>
            <div></div>
        </div>

        <div class="material-list" id="mat-list">
            </div>

        <div class="stats-bar">
            <span>Total Unique Items: <span id="total-items-count" style="color: #fff;">0</span></span>
            <span id="save-status" style="color: var(--wa); font-size: 0.9rem;">✔️ Auto-Saved</span>
        </div>

        <div class="actions no-print">
            <button class="btn btn-wa" onclick="shareWhatsApp()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Send WhatsApp
            </button>
            <button class="btn btn-print" onclick="cleanAndPrint()">🖨️ Print Hardware List</button>
            <button class="btn btn-reset" onclick="startNewNote()">🗑️ Start New Note</button>
        </div>

    </div>

    <script>
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-IN');

        // EXPERT DATABASE
        const db = {
            "Linter/Slab": ["20mm Heavy Pipe", "25mm Heavy Pipe", "20mm Heavy Band", "25mm Heavy Band", "Concealed Box", "Fan Box", "3 inch Brown Tape", "Electrical Tape", "Waste Newspaper", "Steel Wire"],
            "Wall Cutting": ["20mm Light Pipe", "25mm Light Pipe", "20mm Light Band", "25mm Light Band", "Metal Box 2 Module", "Metal Box 3 Module", "Metal Box 4 Module", "Metal Box 6 Module", "Metal Box 8 Module", "Metal Box 12 Module", "Metal Box 16 Module", "Metal Box 18 Module", "Metal Junction Box", "20mm Kaju Pin", "25mm Kaju Pin", "MCB TPN Box", "5-inch Blade", "Electrical Tape"],
            "Wiring": ["0.75 sqmm Wire", "1.0 sqmm Wire", "1.5 sqmm Wire", "2.5 sqmm Wire", "4.0 sqmm Wire", "6.0 sqmm Wire", "10.0 sqmm Wire", "Telephone Wire", "Camera Wire", "Dish/Coaxial Wire", "Steel GI Wire", "20mm Flexible Pipe", "25mm Flexible Pipe", "Electrical Tape"],
            "Fittings": ["Modular Plate 2M", "Modular Plate 3M", "Modular Plate 4M", "Modular Plate 6M", "Modular Plate 8M", "Modular Plate 12M", "Modular Plate 16M", "Modular Plate 18M", "Switch 6 Amp", "Switch 16 Amp", "Socket 6 Amp", "Socket 16 Amp", "Fan Regulator", "Mini MCB 20A", "Mini MCB 25A", "Indicator", "Angle Holder", "Batten Holder", "Round Plate", "Fan Plate", "MICA Sheet", "Brass Screw", "Panel Light", "Concealed Light", "COB Light", "Profile Strip", "Cable Tie", "MCB B6", "MCB C10", "MCB C16", "MCB C20", "MCB C32", "Isolator", "RCCB"]
        };

        const listContainer = document.getElementById('mat-list');
        let globalCategory = "Linter/Slab"; 
        let globalUnit = "Pcs"; // Remembers last used unit

        // 🟢 AUTO-SAVE ENGINE (Monitors entire document for typing/changes)
        document.addEventListener('input', triggerAutoSave);
        document.addEventListener('change', triggerAutoSave);

        function triggerAutoSave() {
            countItems();
            document.getElementById('save-status').innerText = "⏳ Saving...";
            clearTimeout(window.saveTimer);
            window.saveTimer = setTimeout(saveLocalState, 500); // Saves half a second after you stop typing
        }

        function saveLocalState() {
            let state = {
                cName: document.getElementById('c-name').value,
                cAddress: document.getElementById('c-address').value,
                cStage: document.getElementById('c-stage').value,
                rows: []
            };
            document.querySelectorAll('.mat-row').forEach(row => {
                state.rows.push({
                    cat: row.querySelector('.in-cat').value,
                    name: row.querySelector('.in-name').value,
                    spec: row.querySelector('.in-spec').value,
                    qty: row.querySelector('.in-qty').value,
                    unit: row.querySelector('.in-unit').value
                });
            });
            localStorage.setItem('prakash_mat_note', JSON.stringify(state));
            document.getElementById('save-status').innerText = "✔️ Auto-Saved";
        }

        function loadLocalState() {
            let saved = localStorage.getItem('prakash_mat_note');
            if (saved) {
                let state = JSON.parse(saved);
                document.getElementById('c-name').value = state.cName || "";
                document.getElementById('c-address').value = state.cAddress || "";
                document.getElementById('c-stage').value = state.cStage || "";

                if (state.rows && state.rows.length > 0) {
                    listContainer.innerHTML = ""; // Clear
                    state.rows.forEach(rData => createRow(rData));
                } else {
                    initDefaultRows();
                }
            } else {
                initDefaultRows();
            }
            ensureBlankRow();
            countItems();
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', loadLocalState);

        function initDefaultRows() {
            listContainer.innerHTML = "";
            createRow(); createRow(); createRow();
        }

        function startNewNote() {
            if(confirm("Are you sure you want to clear EVERYTHING and start a new note?")) {
                localStorage.removeItem('prakash_mat_note');
                document.getElementById('c-name').value = "";
                document.getElementById('c-address').value = "";
                document.getElementById('c-stage').value = "";
                initDefaultRows();
                countItems();
            }
        }

        function ensureBlankRow() {
            const allRows = document.querySelectorAll('.mat-row');
            if(allRows.length === 0) { createRow(); return; }
            const lastRow = allRows[allRows.length - 1];
            if(lastRow.querySelector('.in-name').value.trim() !== "") {
                createRow();
            }
        }

        function countItems() {
            let count = 0;
            document.querySelectorAll('.mat-row').forEach(row => {
                if(row.querySelector('.in-name').value.trim() !== "") count++;
            });
            document.getElementById('total-items-count').innerText = count;
        }

        // 1. CREATE A NEW ROW (MAGIC AUTO-ADD)
        function createRow(data = null) {
            const row = document.createElement('div');
            row.className = 'mat-row';
            
            // Fast Keyboard Navigation Magic (Press Enter to jump to next input)
            const keyNav = `onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.parentElement.nextElementSibling.querySelector('input, select').focus(); }"`;

            row.innerHTML = `
                <div>
                    <select class="mat-select in-cat" onchange="syncCategories(this)">
                        <option value="Linter/Slab">Linter/Slab</option>
                        <option value="Wall Cutting">Wall Cutting</option>
                        <option value="Wiring">Wiring</option>
                        <option value="Fittings">Fittings</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="custom-dropdown">
                    <input type="text" class="mat-input in-name" placeholder="Type or select material..." oninput="handleInput(this)" onfocus="openDropdown(this)" ${keyNav}>
                    <div class="dropdown-toggle" onclick="toggleBtn(this)">▼</div>
                    <ul class="dropdown-menu"></ul>
                </div>
                <div><input type="text" class="mat-input in-spec" placeholder="Brand/Color" ${keyNav}></div>
                <div><input type="number" class="mat-input in-qty" placeholder="Qty" min="0" ${keyNav}></div>
                <div>
                    <select class="mat-select in-unit" onchange="syncUnits(this)">
                        <option value="Pcs">Pcs</option>
                        <option value="Coil">Coil</option>
                        <option value="Box">Box</option>
                        <option value="Mtr">Mtr</option>
                        <option value="Pkt">Pkt</option>
                        <option value="Bdl">Bdl</option>
                    </select>
                </div>
                <button class="btn-del" onclick="deleteRow(this)" title="Remove Item">✖</button>
            `;
            
            if (data) {
                row.querySelector('.in-cat').value = data.cat || "Linter/Slab";
                row.querySelector('.in-name').value = data.name || "";
                row.querySelector('.in-spec').value = data.spec || "";
                row.querySelector('.in-qty').value = data.qty || "";
                row.querySelector('.in-unit').value = data.unit || "Pcs";
            } else {
                row.querySelector('.in-cat').value = globalCategory;
                row.querySelector('.in-unit').value = globalUnit;
            }

            listContainer.appendChild(row);
        }

        // 2. SMART SYNC (CATEGORY & UNIT)
        function syncCategories(selectElement) {
            globalCategory = selectElement.value; 
            const allRows = Array.from(document.querySelectorAll('.mat-row'));
            const startIndex = allRows.indexOf(selectElement.closest('.mat-row')) + 1;

            for(let i = startIndex; i < allRows.length; i++) {
                if(allRows[i].querySelector('.in-name').value.trim() === "") {
                    allRows[i].querySelector('.in-cat').value = globalCategory;
                } else break;
            }
        }

        function syncUnits(selectElement) {
            globalUnit = selectElement.value; 
            const allRows = Array.from(document.querySelectorAll('.mat-row'));
            const startIndex = allRows.indexOf(selectElement.closest('.mat-row')) + 1;

            for(let i = startIndex; i < allRows.length; i++) {
                if(allRows[i].querySelector('.in-name').value.trim() === "") {
                    allRows[i].querySelector('.in-unit').value = globalUnit;
                } else break;
            }
        }

        function smartUnitGuesser(itemName, unitDropdown) {
            let name = itemName.toLowerCase();
            if(name.includes('wire')) { unitDropdown.value = 'Coil'; syncUnits(unitDropdown); }
            else if(name.includes('tape') || name.includes('tie') || name.includes('screw') || name.includes('pin')) { unitDropdown.value = 'Pkt'; syncUnits(unitDropdown); }
            else if(name.includes('pipe') || name.includes('band')) { unitDropdown.value = 'Pcs'; syncUnits(unitDropdown); }
        }

        // 3. AUTO-ADD ROW
        function handleInput(inputElement) {
            const allRows = document.querySelectorAll('.mat-row');
            const lastRow = allRows[allRows.length - 1];
            if(inputElement.closest('.mat-row') === lastRow && inputElement.value.trim() !== "") {
                createRow();
            }
            
            const menu = inputElement.parentElement.querySelector('.dropdown-menu');
            if(menu.classList.contains('show')) renderDropdownList(inputElement);
        }

        // 4. PRO CUSTOM AUTOCOMPLETE (SMART FILTERING)
        function openDropdown(input) {
            closeAllDropdowns();
            const currentRow = input.closest('.mat-row');
            currentRow.classList.add('active-dropdown');
            renderDropdownList(input);
            input.parentElement.querySelector('.dropdown-menu').classList.add('show');
        }

        function toggleBtn(btn) {
            const input = btn.parentElement.querySelector('.in-name');
            const menu = btn.parentElement.querySelector('.dropdown-menu');
            
            if(menu.classList.contains('show')) {
                closeAllDropdowns();
            } else {
                input.value = ""; 
                openDropdown(input);
                input.focus();
            }
        }

        function renderDropdownList(input) {
            const wrapper = input.parentElement;
            const menu = wrapper.querySelector('.dropdown-menu');
            const rowCat = wrapper.closest('.mat-row').querySelector('.in-cat').value;
            
            let items = db[rowCat] || [];
            let filterText = input.value.toLowerCase();
            
            // Get all items ALREADY selected by the user to remove them from dropdown
            let usedItems = Array.from(document.querySelectorAll('.in-name'))
                                 .map(inp => input !== inp ? inp.value.trim().toLowerCase() : "")
                                 .filter(val => val !== "");
            
            menu.innerHTML = "";
            let matchCount = 0;

            items.forEach(item => {
                let itemLower = item.toLowerCase();
                // ONLY show if it matches typing AND hasn't been selected already
                if(itemLower.includes(filterText) && !usedItems.includes(itemLower)) {
                    let li = document.createElement('li');
                    li.innerText = item;
                    li.onmousedown = function(e) { 
                        e.preventDefault(); 
                        input.value = item;
                        smartUnitGuesser(item, wrapper.closest('.mat-row').querySelector('.in-unit'));
                        closeAllDropdowns();
                        handleInput(input);
                        triggerAutoSave();
                        // Jump to next input automatically
                        wrapper.closest('.mat-row').querySelector('.in-spec').focus();
                    };
                    menu.appendChild(li);
                    matchCount++;
                }
            });

            if(matchCount === 0) {
                let li = document.createElement('li');
                li.innerText = "Type to add custom item...";
                li.style.color = "#888";
                menu.appendChild(li);
            }
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.mat-row').forEach(r => r.classList.remove('active-dropdown'));
        }
        
        document.addEventListener('mousedown', function(e) {
            if(!e.target.closest('.custom-dropdown')) closeAllDropdowns();
        });

        // 5. DELETE ROW
        function deleteRow(btn) {
            const rows = document.querySelectorAll('.mat-row');
            if(rows.length > 1) {
                btn.closest('.mat-row').remove();
            } else {
                const row = btn.closest('.mat-row');
                row.querySelector('.in-name').value = "";
                row.querySelector('.in-spec').value = "";
                row.querySelector('.in-qty').value = "";
            }
            triggerAutoSave();
        }

        // 6. PREPARE & PRINT
        function cleanAndPrint() {
            const rows = document.querySelectorAll('.mat-row');
            rows.forEach(row => {
                let name = row.querySelector('.in-name').value.trim();
                let qty = row.querySelector('.in-qty').value.trim();
                if(name === "" || qty === "" || qty === "0") {
                    row.classList.add('hide-on-print');
                } else {
                    row.classList.remove('hide-on-print');
                }
            });
            window.print();
        }

        // 7. SEND TO WHATSAPP
        function shareWhatsApp() {
            let cName = document.getElementById('c-name').value || "Customer";
            let msg = `*MATERIAL REQUIREMENT NOTE*\n*Site:* ${cName}\n----------------------\n`;
            
            let categories = {};
            
            document.querySelectorAll('.mat-row').forEach(row => {
                let cat = row.querySelector('.in-cat').value;
                let name = row.querySelector('.in-name').value.trim();
                let spec = row.querySelector('.in-spec').value.trim();
                let qty = parseFloat(row.querySelector('.in-qty').value) || 0;
                let unit = row.querySelector('.in-unit').value;
                
                if(name !== "" && qty > 0) {
                    if(!categories[cat]) categories[cat] = [];
                    let specText = spec !== "" ? ` (${spec})` : "";
                    categories[cat].push(`▪ ${name}${specText} - *${qty} ${unit}*`);
                }
            });

            for (const [catName, items] of Object.entries(categories)) {
                msg += `\n*${catName.toUpperCase()}*\n`;
                msg += items.join("\n") + "\n";
            }
            
            msg += `\n_Generated securely by Prakash Electrician_`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
