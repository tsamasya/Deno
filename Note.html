<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Professional Material Estimate Generator - Create, save, and share material estimates instantly">
    <title>Material Estimate | Prakash Electrician</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Premium Color Palette */
            --primary: #FFD000;
            --primary-dark: #e6bb00;
            --primary-light: #fff8e6;
            --bg-main: #f5f7fa;
            --bg-alt: #eef0f6;
            --card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a5568;
            --text-muted: #7a8a9a;
            --border-light: #e8eef5;
            --border-mid: #d4dce6;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f97316;
            --whatsapp: #25D366;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-display: 'Barlow Condensed', sans-serif;
            --font-body: 'Nunito', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { scroll-behavior: smooth; }
        
        body {
            background: linear-gradient(135deg, var(--bg-main) 0%, var(--bg-alt) 100%);
            color: var(--text-primary);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        /* ===== HEADER SECTION ===== */
        .header {
            background: linear-gradient(135deg, var(--text-primary) 0%, #2d3748 100%);
            color: white;
            padding: 35px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .header-left { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 250px; }
        
        .brand-badge {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
            font-family: var(--font-display);
            box-shadow: 0 4px 16px rgba(255, 208, 0, 0.3);
        }

        .brand-text h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            line-height: 1.1;
            margin-bottom: 4px;
        }

        .brand-text h1 span { color: var(--primary); }

        .brand-text .tagline {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .doc-title h2 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .doc-date {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* ===== CONTENT AREA ===== */
        .main-content { padding: 40px; }

        /* --- SUMMARY DASHBOARD --- */
        .summary-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 35px;
            background: linear-gradient(135deg, var(--primary-light) 0%, rgba(255, 208, 0, 0.05) 100%);
            padding: 24px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 208, 0, 0.3);
        }

        .summary-card {
            background: white;
            padding: 16px;
            border-radius: var(--radius-sm);
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            transition: var(--transition);
        }

        .summary-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .summary-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .summary-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-dark);
            font-family: var(--font-display);
            line-height: 1;
        }

        /* --- CUSTOMER INFO SECTION --- */
        .customer-section {
            margin-bottom: 35px;
        }

        .section-heading {
            font-family: var(--font-display);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-heading::before {
            content: '';
            width: 4px;
            height: 16px;
            background: var(--primary);
            border-radius: 2px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            background: var(--bg-main);
            padding: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.9px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .input-group input {
            padding: 10px 12px;
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 600;
            outline: none;
            transition: var(--transition);
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 208, 0, 0.1);
            background: white;
        }

        .input-group input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* --- CONTROLS BAR --- */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }

        .status-value {
            color: var(--text-primary);
            font-weight: 800;
            font-size: 1rem;
        }

        .save-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            color: var(--success);
            animation: pulse 2s ease-in-out infinite;
        }

        .save-indicator.saving {
            color: var(--primary);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* --- MATERIALS SECTION --- */
        .materials-section h3 { display: none; }

        .list-header {
            display: flex;
            gap: 12px;
            padding: 14px 16px;
            background: linear-gradient(135deg, var(--bg-main) 0%, var(--bg-alt) 100%);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            font-family: var(--font-display);
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.9px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid var(--border-light);
            align-items: center;
        }

        .col-cat { flex: 1.2; }
        .col-name { flex: 2.5; }
        .col-spec { flex: 1.8; }
        .col-qty { flex: 0.7; text-align: center; }
        .col-unit { flex: 0.9; text-align: center; }
        .col-del { width: 40px; text-align: center; }

        /* --- MATERIAL LIST --- */
        .material-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 4px;
            margin-bottom: 25px;
        }

        .material-list::-webkit-scrollbar {
            width: 6px;
        }

        .material-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
            opacity: 0.6;
        }

        .material-list::-webkit-scrollbar-track {
            background: transparent;
        }

        /* --- MATERIAL ROW --- */
        .mat-row {
            display: flex;
            gap: 12px;
            background: white;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            align-items: center;
            transition: var(--transition);
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .mat-row:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
            background: rgba(255, 208, 0, 0.02);
        }

        .mat-row:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 208, 0, 0.15);
        }

        .mat-row.is-duplicate {
            border-color: var(--error);
            background: rgba(239, 68, 68, 0.04);
        }

        .mat-row.is-empty {
            opacity: 0.5;
        }

        .mat-input, .mat-select {
            width: 100%;
            padding: 9px 10px;
            background: var(--bg-main);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            outline: none;
            transition: var(--transition);
        }

        .mat-input:focus, .mat-select:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 208, 0, 0.1);
        }

        .mat-input::placeholder {
            color: var(--text-muted);
        }

        .col-qty .mat-input {
            text-align: center;
            font-weight: 800;
        }

        /* --- CUSTOM DROPDOWN --- */
        .custom-dropdown {
            position: relative;
            width: 100%;
        }

        .dropdown-toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            color: var(--text-muted);
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.6rem;
            z-index: 2;
            transition: var(--transition);
            border-radius: 50%;
        }

        .dropdown-toggle:hover {
            background: rgba(0, 0, 0, 0.05);
            color: var(--primary);
        }

        .mat-row.active-dropdown {
            z-index: 100;
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(255, 208, 0, 0.2);
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            width: 100%;
            max-height: 240px;
            overflow-y: auto;
            background: white;
            border: 1px solid var(--border-mid);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            display: none;
            list-style: none;
            padding: 6px 0;
            z-index: 200;
        }

        .dropdown-menu.show {
            display: block;
            animation: dropIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes dropIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-menu li {
            padding: 10px 14px;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border-light);
            transition: var(--transition);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dropdown-menu li:last-child { border-bottom: none; }

        .dropdown-menu li:hover {
            background: var(--primary-light);
            color: var(--primary-dark);
            font-weight: 700;
            padding-left: 18px;
        }

        /* --- DELETE BUTTON --- */
        .btn-del {
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            padding: 4px;
            flex-shrink: 0;
        }

        .btn-del:hover {
            color: white;
            background: var(--error);
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        /* --- EMPTY STATE --- */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .empty-state p {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* --- ACTIONS SECTION --- */
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            padding-top: 24px;
            border-top: 2px solid var(--border-light);
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 140px;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .btn:hover::before {
            transform: translateX(100%);
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* Button Variants */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--text-primary);
            box-shadow: 0 4px 15px rgba(255, 208, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 208, 0, 0.4);
        }

        .btn-wa {
            background: linear-gradient(135deg, var(--whatsapp) 0%, #1ebd5c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-wa:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
        }

        .btn-print {
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(26, 26, 46, 0.2);
        }

        .btn-print:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(26, 26, 46, 0.3);
        }

        .btn-secondary {
            background: white;
            color: var(--text-primary);
            border: 2px solid var(--border-mid);
            box-shadow: none;
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary-dark);
            background: var(--primary-light);
        }

        /* --- TOAST NOTIFICATIONS --- */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 380px;
            pointer-events: none;
        }

        .toast {
            background: var(--card);
            color: var(--text-primary);
            padding: 14px 18px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid var(--primary);
            font-size: 0.9rem;
            pointer-events: auto;
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--error); }
        .toast.warning { border-left-color: var(--warning); }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- FOOTER --- */
        .footer {
            background: var(--bg-main);
            padding: 20px 40px;
            border-top: 1px solid var(--border-light);
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        /* ===== PRINT STYLES ===== */
        @media print {
            body { padding: 0; background: white; }
            .container { box-shadow: none; border: none; }
            .header { padding: 25px 40px; }
            .controls-bar, .actions, .footer, .material-list::-webkit-scrollbar { display: none !important; }
            .mat-row.hide-on-print { display: none !important; }
            .main-content { padding: 30px 40px; }
            .material-list { max-height: none; }
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { border-radius: var(--radius-md); }
            .main-content { padding: 20px; }

            .header {
                flex-direction: column;
                align-items: flex-start;
                padding: 25px 20px;
                gap: 20px;
            }

            .header-right { align-items: flex-start; }
            .doc-title h2 { font-size: 1.2rem; }

            .brand-text h1 { font-size: 1.4rem; }
            .summary-dashboard { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px; }

            .info-grid { grid-template-columns: 1fr; gap: 12px; }
            .controls-bar { flex-direction: column; align-items: flex-start; }

            .list-header {
                font-size: 0.7rem;
                padding: 10px 12px;
            }

            .col-spec { display: none; }
            .col-name { flex: 3; }

            .mat-row {
                gap: 8px;
                padding: 10px 12px;
                font-size: 0.85rem;
            }

            .mat-input, .mat-select {
                font-size: 0.85rem;
                padding: 8px 8px;
            }

            .actions {
                flex-direction: column;
                gap: 10px;
            }

            .btn {
                width: 100%;
                min-width: unset;
                padding: 12px 20px;
            }

            #toast-container {
                right: 15px;
                bottom: 20px;
                max-width: calc(100vw - 30px);
            }

            .section-heading { font-size: 0.8rem; }
        }

        @media (max-width: 480px) {
            .header { padding: 18px 15px; }
            .main-content { padding: 15px; }
            .brand-text h1 { font-size: 1.1rem; }
            .brand-badge { width: 45px; height: 45px; font-size: 1.5rem; }
            .summary-dashboard { grid-template-columns: 1fr; gap: 10px; padding: 12px; }
            .summary-value { font-size: 1.5rem; }
            .summary-label { font-size: 0.65rem; }
            .col-unit { display: none; }
            .list-header { padding: 8px 10px; }
            .mat-row { gap: 6px; padding: 8px 10px; }
        }

        /* ===== ACCESSIBILITY ===== */
        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        .btn:focus-visible, .mat-input:focus-visible, .mat-select:focus-visible {
            outline: 3px solid var(--primary);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== PREMIUM HEADER ===== -->
        <header class="header">
            <div class="header-left">
                <div class="brand-badge">⚡</div>
                <div class="brand-text">
                    <h1><span>PRAKASH</span> Electrician</h1>
                    <div class="tagline">Material Estimate System</div>
                </div>
            </div>
            <div class="header-right">
                <div class="doc-title">
                    <h2>Estimate</h2>
                    <div class="doc-date" id="current-date"></div>
                </div>
            </div>
        </header>

        <!-- ===== MAIN CONTENT ===== -->
        <div class="main-content">
            <!-- SUMMARY DASHBOARD -->
            <div class="summary-dashboard">
                <div class="summary-card">
                    <div class="summary-label">Total Items</div>
                    <div class="summary-value" id="total-items">0</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Categories</div>
                    <div class="summary-value" id="total-cats">0</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Status</div>
                    <div class="summary-value" id="status-badge" style="font-size: 1.3rem; color: var(--text-muted);">○</div>
                </div>
            </div>

            <!-- CUSTOMER SECTION -->
            <div class="customer-section">
                <div class="section-heading">Customer Details</div>
                <div class="info-grid">
                    <div class="input-group">
                        <label for="c-name">Customer Name</label>
                        <input type="text" id="c-name" class="info-input" placeholder="Enter customer/project name">
                    </div>
                    <div class="input-group">
                        <label for="c-phone">Phone Number</label>
                        <input type="tel" id="c-phone" class="info-input" placeholder="+91 98765 43210">
                    </div>
                    <div class="input-group">
                        <label for="c-location">Location / Site</label>
                        <input type="text" id="c-location" class="info-input" placeholder="Project location">
                    </div>
                    <div class="input-group">
                        <label for="c-notes">Project Notes</label>
                        <input type="text" id="c-notes" class="info-input" placeholder="Additional details">
                    </div>
                </div>
            </div>

            <!-- MATERIALS SECTION -->
            <div class="materials-section">
                <div class="section-heading">Material List</div>
                
                <!-- CONTROLS BAR -->
                <div class="controls-bar">
                    <div class="status-info">
                        <div class="status-item">
                            📦 <span class="status-value" id="item-count">0</span> Items
                        </div>
                        <div class="status-item" id="save-status-container">
                            <span class="save-indicator">✓ Saved</span>
                        </div>
                    </div>
                </div>

                <!-- LIST HEADER -->
                <div class="list-header">
                    <div class="col-cat">Category</div>
                    <div class="col-name">Material Name</div>
                    <div class="col-spec">Specifications</div>
                    <div class="col-qty">Qty</div>
                    <div class="col-unit">Unit</div>
                    <div class="col-del"></div>
                </div>

                <!-- MATERIAL LIST -->
                <div class="material-list" id="material-list"></div>
            </div>

            <!-- ACTION BUTTONS -->
            <div class="actions">
                <button class="btn btn-primary" onclick="addRow();">➕ Add Item</button>
                <button class="btn btn-wa" onclick="shareWhatsApp();">💬 Share via WhatsApp</button>
                <button class="btn btn-print" onclick="cleanAndPrint();">🖨️ Print Estimate</button>
                <button class="btn btn-secondary" onclick="resetForm();">↻ Reset Form</button>
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="footer">
            🔐 Data saved locally • Auto-save enabled • Prakash Electrician
        </footer>
    </div>

    <!-- TOAST NOTIFICATIONS -->
    <div id="toast-container"></div>

    <script>
        // ==================== DATABASE ====================
        const db = {
            "Wiring": ["1.5 sq.mm Wire", "2.5 sq.mm Wire", "4 sq.mm Wire", "6 sq.mm Wire", "10 sq.mm Wire", "16 sq.mm Wire", "Single Phase Wire", "3 Phase Wire", "Earth Wire (GI)"],
            "Switches": ["Single Switch", "Double Switch", "Triple Switch", "4-Way Switch", "Dimmer Switch", "Smart Switch", "Socket Outlet", "Double Socket", "Power Outlet"],
            "Breakers": ["MCB 6A", "MCB 10A", "MCB 16A", "MCB 20A", "MCB 32A", "MCB 63A", "RCCB 30mA", "RCBO 16A"],
            "Panels": ["Distribution Board 4 Way", "Distribution Board 6 Way", "Distribution Board 8 Way", "MCB Panel", "Main Switch Box", "Meter Board"],
            "Lighting": ["LED Bulb 9W", "LED Bulb 12W", "LED Panel 18W", "LED Panel 36W", "Downlight 7W", "Street Light 50W", "Tube Light 18W", "Spotlight 5W"],
            "Fans": ["Ceiling Fan", "Exhaust Fan", "Pedestal Fan", "Table Fan", "Air Cooler", "AC Unit"],
            "AC Equipment": ["Window AC 1.5 Ton", "Window AC 2 Ton", "Split AC 1.5 Ton", "Split AC 2 Ton", "AC Installation Kit", "Copper Pipe 1/4\"", "Copper Pipe 3/8\""],
            "Conduit": ["PVC Conduit 16mm", "PVC Conduit 20mm", "PVC Conduit 25mm", "Rigid Steel Conduit 16mm", "Rigid Steel Conduit 20mm", "Flexible Conduit 16mm"],
            "Earthing": ["Earth Rod (Copper)", "Earth Rod (GI)", "Earth Pit", "Earthing Cable", "Earthing Strip", "Bonding Wire"],
            "Hardware": ["Wooden Box", "Metal Box", "Electrical Tape", "Terminal Block", "Cable Gland", "Isolator Switch", "Knife Switch"]
        };

        // ==================== INITIALIZATION ====================
        window.addEventListener('DOMContentLoaded', function() {
            loadLocalState();
            updateSummary();
            ensureBlankRow();
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-IN', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        });

        // ==================== MATERIAL ROW TEMPLATE ====================
        function createMaterialRow() {
            const row = document.createElement('div');
            row.className = 'mat-row';
            row.innerHTML = `
                <div class="col-cat">
                    <select class="mat-select in-cat" onchange="handleInput(this); triggerAutoSave();">
                        <option value="Wiring">Wiring</option>
                        <option value="Switches">Switches</option>
                        <option value="Breakers">Breakers</option>
                        <option value="Panels">Panels</option>
                        <option value="Lighting">Lighting</option>
                        <option value="Fans">Fans</option>
                        <option value="AC Equipment">AC Equip.</option>
                        <option value="Conduit">Conduit</option>
                        <option value="Earthing">Earthing</option>
                        <option value="Hardware">Hardware</option>
                    </select>
                </div>
                <div class="col-name">
                    <div class="custom-dropdown">
                        <input type="text" class="mat-input in-name" placeholder="Material name" onkeyup="renderDropdownList(this); handleInput(this);" onfocus="renderDropdownList(this); this.parentElement.querySelector('.dropdown-menu').classList.add('show');" oninput="triggerAutoSave();">
                        <span class="dropdown-toggle" onclick="this.closest('.custom-dropdown').querySelector('.dropdown-menu').classList.toggle('show');">⌄</span>
                        <ul class="dropdown-menu"></ul>
                    </div>
                </div>
                <div class="col-spec">
                    <input type="text" class="mat-input in-spec" placeholder="Size / specs" oninput="handleInput(this); triggerAutoSave();">
                </div>
                <div class="col-qty">
                    <input type="number" class="mat-input in-qty" placeholder="0" min="0" step="0.5" oninput="handleInput(this); triggerAutoSave();">
                </div>
                <div class="col-unit">
                    <select class="mat-select in-unit" oninput="triggerAutoSave();">
                        <option>Pcs</option>
                        <option>m</option>
                        <option>m²</option>
                        <option>kg</option>
                        <option>L</option>
                        <option>Box</option>
                        <option>Roll</option>
                    </select>
                </div>
                <div class="col-del">
                    <button class="btn-del" onclick="deleteRow(this);" title="Delete row">✕</button>
                </div>
            `;
            return row;
        }

        // ==================== ADD ROW ====================
        function addRow() {
            document.getElementById('material-list').appendChild(createMaterialRow());
            triggerAutoSave();
            updateSummary();
            showToast('✅ New item added', 'success');
        }

        // ==================== ENSURE BLANK ROW ====================
        function ensureBlankRow() {
            const list = document.getElementById('material-list');
            if (list.children.length === 0) {
                list.appendChild(createMaterialRow());
            }
        }

        // ==================== HANDLE INPUT ====================
        function handleInput(input) {
            const row = input.closest('.mat-row');
            const name = row.querySelector('.in-name').value.trim().toLowerCase();
            const qty = parseFloat(row.querySelector('.in-qty').value) || 0;

            // Check if empty
            if (!name && qty === 0) {
                row.classList.add('is-empty');
            } else {
                row.classList.remove('is-empty');
            }

            // Check for duplicates
            let isDuplicate = false;
            document.querySelectorAll('.mat-row').forEach(r => {
                if (r !== row && r.querySelector('.in-name').value.trim().toLowerCase() === name && name !== "") {
                    isDuplicate = true;
                }
            });
            row.classList.toggle('is-duplicate', isDuplicate);

            updateSummary();
        }

        // ==================== DROPDOWN LIST ====================
        function renderDropdownList(input) {
            const menu = input.parentElement.querySelector('.dropdown-menu');
            const cat = input.closest('.mat-row').querySelector('.in-cat').value;
            let items = db[cat] || [];
            let filter = input.value.toLowerCase();

            let usedItems = Array.from(document.querySelectorAll('.in-name'))
                .map(i => input !== i ? i.value.trim().toLowerCase() : "")
                .filter(v => v);

            menu.innerHTML = "";
            let count = 0;

            items.forEach(item => {
                if (item.toLowerCase().includes(filter) && !usedItems.includes(item.toLowerCase())) {
                    let li = document.createElement('li');
                    li.innerText = item;
                    li.onmousedown = function(e) {
                        e.preventDefault();
                        input.value = item;
                        closeAllDropdowns();
                        handleInput(input);
                        triggerAutoSave();
                        input.closest('.mat-row').querySelector('.in-spec').focus();
                    };
                    menu.appendChild(li);
                    count++;
                }
            });

            if (count === 0 && filter) {
                let li = document.createElement('li');
                li.innerHTML = "➕ <em>Or type custom item...</em>";
                li.style.color = "#999";
                li.style.fontStyle = "italic";
                menu.appendChild(li);
            }
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
        }

        document.addEventListener('mousedown', e => {
            if (!e.target.closest('.custom-dropdown')) closeAllDropdowns();
        });

        // ==================== DELETE ROW ====================
        function deleteRow(btn) {
            const list = document.getElementById('material-list');
            if (list.children.length > 1) {
                btn.closest('.mat-row').remove();
                showToast('🗑️ Item removed', 'success');
            } else {
                const row = btn.closest('.mat-row');
                row.querySelector('.in-name').value = "";
                row.querySelector('.in-spec').value = "";
                row.querySelector('.in-qty').value = "";
                row.querySelector('.in-cat').value = "Wiring";
                showToast('🔄 Form cleared', 'success');
            }
            updateSummary();
            triggerAutoSave();
        }

        // ==================== SUMMARY UPDATE ====================
        function updateSummary() {
            let totalItems = 0;
            let categories = new Set();
            let completedItems = 0;

            document.querySelectorAll('.mat-row').forEach(row => {
                const name = row.querySelector('.in-name').value.trim();
                const qty = parseFloat(row.querySelector('.in-qty').value) || 0;
                const cat = row.querySelector('.in-cat').value;

                if (name && qty > 0) {
                    totalItems++;
                    categories.add(cat);
                    completedItems++;
                } else if (name || qty > 0) {
                    categories.add(cat);
                }
            });

            document.getElementById('total-items').textContent = totalItems;
            document.getElementById('total-cats').textContent = categories.size;
            document.getElementById('item-count').textContent = totalItems;

            // Status badge
            const badge = document.getElementById('status-badge');
            if (totalItems === 0) {
                badge.textContent = '○';
                badge.style.color = 'var(--text-muted)';
            } else if (totalItems < 5) {
                badge.textContent = '◐';
                badge.style.color = 'var(--warning)';
            } else {
                badge.textContent = '●';
                badge.style.color = 'var(--success)';
            }
        }

        // ==================== AUTO-SAVE ====================
        let autoSaveTimer;
        function triggerAutoSave() {
            clearTimeout(autoSaveTimer);
            const container = document.getElementById('save-status-container');
            container.querySelector('.save-indicator').classList.add('saving');
            container.querySelector('.save-indicator').textContent = '⟳ Saving...';

            autoSaveTimer = setTimeout(() => {
                saveLocalState();
                container.querySelector('.save-indicator').classList.remove('saving');
                container.querySelector('.save-indicator').textContent = '✓ Saved';
            }, 800);
        }

        function saveLocalState() {
            let data = {
                customerInfo: {
                    name: document.getElementById('c-name').value,
                    phone: document.getElementById('c-phone').value,
                    location: document.getElementById('c-location').value,
                    notes: document.getElementById('c-notes').value
                },
                materials: []
            };

            document.querySelectorAll('.mat-row').forEach(row => {
                const item = {
                    category: row.querySelector('.in-cat').value,
                    name: row.querySelector('.in-name').value,
                    spec: row.querySelector('.in-spec').value,
                    qty: row.querySelector('.in-qty').value,
                    unit: row.querySelector('.in-unit').value
                };
                data.materials.push(item);
            });

            localStorage.setItem('estimateData', JSON.stringify(data));
        }

        function loadLocalState() {
            const saved = localStorage.getItem('estimateData');
            if (saved) {
                const data = JSON.parse(saved);
                
                // Load customer info
                document.getElementById('c-name').value = data.customerInfo?.name || '';
                document.getElementById('c-phone').value = data.customerInfo?.phone || '';
                document.getElementById('c-location').value = data.customerInfo?.location || '';
                document.getElementById('c-notes').value = data.customerInfo?.notes || '';

                // Load materials
                const list = document.getElementById('material-list');
                list.innerHTML = '';
                
                if (data.materials && data.materials.length > 0) {
                    data.materials.forEach(item => {
                        const row = createMaterialRow();
                        row.querySelector('.in-cat').value = item.category;
                        row.querySelector('.in-name').value = item.name;
                        row.querySelector('.in-spec').value = item.spec;
                        row.querySelector('.in-qty').value = item.qty;
                        row.querySelector('.in-unit').value = item.unit;
                        list.appendChild(row);
                    });
                } else {
                    list.appendChild(createMaterialRow());
                }
            }
        }

        // ==================== TOAST NOTIFICATIONS ====================
        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${message.split(' ')[0]}</span> ${message.substring(message.indexOf(' ') + 1)}`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideInUp 0.4s reverse';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // ==================== PRINT ====================
        function cleanAndPrint() {
            document.querySelectorAll('.mat-row').forEach(row => {
                const name = row.querySelector('.in-name').value.trim();
                const qty = parseFloat(row.querySelector('.in-qty').value) || 0;
                row.classList.toggle('hide-on-print', !name || qty === 0);
            });
            showToast('🖨️ Opening print preview...', 'success');
            setTimeout(() => window.print(), 300);
        }

        // ==================== WHATSAPP SHARE ====================
        function shareWhatsApp() {
            const cName = document.getElementById('c-name').value || "Customer";
            const phone = document.getElementById('c-phone').value;
            const location = document.getElementById('c-location').value;
            
            let msg = `*📋 MATERIAL ESTIMATE*\n`;
            msg += `*Customer:* ${cName}\n`;
            if (location) msg += `*Location:* ${location}\n`;
            if (phone) msg += `*Phone:* ${phone}\n`;
            msg += `*Date:* ${new Date().toLocaleDateString('en-IN')}\n`;
            msg += `════════════════════════\n`;

            let categories = {};
            document.querySelectorAll('.mat-row').forEach(row => {
                const cat = row.querySelector('.in-cat').value;
                const name = row.querySelector('.in-name').value.trim();
                const spec = row.querySelector('.in-spec').value.trim();
                const qty = parseFloat(row.querySelector('.in-qty').value) || 0;
                const unit = row.querySelector('.in-unit').value;

                if (name && qty > 0) {
                    if (!categories[cat]) categories[cat] = [];
                    categories[cat].push(`▪ ${name}${spec ? ` (${spec})` : ''} → *${qty} ${unit}*`);
                }
            });

            for (const [catName, items] of Object.entries(categories)) {
                msg += `\n*${catName.toUpperCase()}*\n`;
                msg += items.join("\n") + "\n";
            }

            msg += `════════════════════════\n`;
            msg += `*Total Items:* ${document.querySelectorAll('.mat-row .in-qty').length}\n`;
            msg += `*Generated by:* Prakash Electrician`;

            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            showToast('💬 Opening WhatsApp...', 'success');
        }

        // ==================== RESET FORM ====================
        function resetForm() {
            if (confirm('⚠️ Clear all data? This cannot be undone.')) {
                document.getElementById('c-name').value = '';
                document.getElementById('c-phone').value = '';
                document.getElementById('c-location').value = '';
                document.getElementById('c-notes').value = '';
                document.getElementById('material-list').innerHTML = '';
                ensureBlankRow();
                updateSummary();
                localStorage.removeItem('estimateData');
                showToast('🔄 Form reset successfully', 'success');
            }
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeAllDropdowns();
        });
    </script>
</body>
</html>
